name = "palgate-opener"
# account_id = "your-account-id" # uncomment and set before deploy if your Wrangler config requires it
main = "worker.js"
compatibility_date = "2026-01-01"

[build]
upload.format = "modules"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
